<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial de Tareas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            background-color: #f5f5f5;
        }
        h1, h2 { color: #333; text-align: center; }
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }
        label { font-weight: bold; color: #555; }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0 16px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4A90E2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background-color: #357ABD; }
        .tarea-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }
        .tarea-nombre { font-weight: bold; color: #333; font-size: 16px; }
        .tarea-info { color: #666; font-size: 13px; margin-top: 5px; }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .pendiente { background-color: #FFF3CD; color: #856404; }
        .realizado { background-color: #D4EDDA; color: #155724; }
        .empty { text-align: center; color: #999; padding: 20px; }
        a {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #4A90E2;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>Historial de Tareas</h1>

    <div class="card">
        <h2>Registrar tarea</h2>
        <form method="POST" action="/view_history">
            <label>Tarea:</label>
            <input type="text" name="tarea" placeholder="Nombre de la tarea..." required>

            <label>Fecha inicio:</label>
            <input type="date" name="fecha_inicio" required>

            <label>Fecha final:</label>
            <input type="date" name="fecha_final" required>

            <label>Estado:</label>
            <select name="estado">
                <option value="pendiente">Pendiente</option>
                <option value="realizado">Realizado</option>
            </select>

            <button type="submit">Guardar tarea</button>
        </form>
    </div>

    <h2>Tareas registradas</h2>

    {% if tareas %}
        {% for tarea in tareas %}
        <div class="tarea-card">
            <div class="tarea-nombre">{{ tarea.TAREA }}</div>
            <div class="tarea-info">
                Inicio: {{ tarea.INICIO }} | Fin: {{ tarea.FIN }}
            </div>
            <div class="tarea-info">
                <span class="badge {{ tarea.ESTADO | lower }}">{{ tarea.ESTADO }}</span>
            </div>
        </div>
        {% endfor %}
    {% else %}
        <div class="card empty">
            <p>No hay tareas registradas aún.</p>
        </div>
    {% endif %}

    <a href="/">← Volver al menú</a>
</body>
</html>
