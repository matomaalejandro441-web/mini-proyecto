<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Nota</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            background-color: #f5f5f5;
        }
        h1 { color: #333; text-align: center; }
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        label { font-weight: bold; color: #555; }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0 16px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4A90E2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background-color: #357ABD; }
        a {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #4A90E2;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Crear Nueva Nota</h1>
        <form method="POST" action="/create_note">
            <label>Título:</label>
            <input type="text" name="titulo" placeholder="Escribe el título..." required>

            <label>Contenido:</label>
            <textarea name="contenido" rows="5" placeholder="Escribe el contenido..." required></textarea>

            <button type="submit">Guardar nota</button>
        </form>
        <a href="/">← Volver al menú</a>
    </div>
</body>
</html>
